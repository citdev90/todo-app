  build-android-release:
    name: Build Android APK
    working_directory: .
    environment:
      vars:
        NODE: 20
      node: 20
    cache:
      cache_paths:
        - ~/.npm
        - node_modules
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: develop
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Setup Cordova
        script: |
          npx cordova platform add android
          npx cordova plugin add cordova-plugin-device
          npx cordova plugin add cordova-plugin-dialogs
          npx cordova plugin add cordova-plugin-whitelist
      - name: Build React app
        script: |
          npm run build
      - name: Build Android APK
        script: |
          npx cordova build android --release -- --packageType=apk
    artifacts:
      - platforms/android/app/build/outputs/apk/release/*.apk
      # You can keep this if you also want the AAB sometimes
      # - platforms/android/app/build/outputs/bundle/release/*.aab