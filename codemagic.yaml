workflows:
  build-android-release:
    name: Build Android APK
    working_directory: .
    environment:
      vars:
        NODE: 20
        # Uncomment and set these for signed APK
        # CM_KEYSTORE_PASSWORD: Encrypted(...)
        # CM_KEY_ALIAS_PASSWORD: Encrypted(...)
        # CM_KEYSTORE_PATH: /tmp/keystore.keystore
      node: 20
      java: 17
    cache:
      cache_paths:
        - ~/.npm
        - node_modules
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: develop
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Setup Cordova Platform
        script: |
          npx cordova platform remove android || true
          npx cordova platform add android
      - name: Clean Plugin Cache
        script: |
          rm -rf platforms/android/app/src/main/java/org/apache/cordova/whitelist
          rm -rf plugins/cordova-plugin-whitelist
      - name: Build React app for Cordova
        script: |
          npm run build
      - name: Add Cordova Plugins
        script: |
          npx cordova plugin add cordova-plugin-device
          npx cordova plugin add cordova-plugin-dialogs
          # cordova-plugin-whitelist is deprecated and no longer needed in modern Cordova
      - name: Prepare Cordova
        script: |
          npx cordova prepare android
      - name: Build Android APK
        script: |
          npx cordova build android --release -- --packageType=apk
    artifacts:
      - platforms/android/app/build/outputs/apk/release/*.apk
      # Uncomment the line below if you also want the AAB file
      # - platforms/android/app/build/outputs/bundle/release/*.aab

  build-ios-release:
    name: Build iOS (when needed)
    working_directory: .
    environment:
      vars:
        NODE: 20
      node: 20
      xcode: latest
    cache:
      cache_paths:
        - ~/.npm
        - node_modules
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Setup Cordova
        script: |
          npx cordova platform add ios
          npx cordova plugin add cordova-plugin-device
          npx cordova plugin add cordova-plugin-dialogs
          npx cordova plugin add cordova-plugin-whitelist
      - name: Build React app
        script: |
          npm run build
      - name: Build iOS
        script: |
          npx cordova build ios --release
    artifacts:
      - platforms/ios/build/device/*.ipa

  development-build:
    name: Development Build
    working_directory: .
    environment:
      vars:
        NODE: 20
      node: 20
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Setup Cordova Platform
        script: |
          npx cordova platform remove android || true
          npx cordova platform add android
      - name: Clean Plugin Cache
        script: |
          rm -rf platforms/android/app/src/main/java/org/apache/cordova/whitelist
          rm -rf plugins/cordova-plugin-whitelist
      - name: Build React app for Cordova
        script: |
          npm run build
      - name: Add Cordova Plugins
        script: |
          npx cordova plugin add cordova-plugin-device
          npx cordova plugin add cordova-plugin-dialogs
          # cordova-plugin-whitelist is deprecated and no longer needed in modern Cordova
      - name: Prepare Cordova
        script: |
          npx cordova prepare android
      - name: Build Android Debug
        script: |
          npx cordova build android --debug
    artifacts:
      - platforms/android/app/build/outputs/apk/debug/*.apks